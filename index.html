<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITHUB ISSUE TRACKER | Sign In</title>

    <!-- CSS file linkage -->

    <link rel="stylesheet" href="./style/style.css">

    <!-- Tailwind CSS + DaisyUI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google font: Geist -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Web Tab Icon -->

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>

<body>

    <main class="w-11/12 mx-auto space-y-5">

        <section class="md:w-6/12 sm:w-11/12 mx-auto text-center mt-10 pb-5 bg-[#F8FAFC] shadow-lg rounded-md flex flex-col justify-center mb-8">


            <!-- Login Page -->

            <div class="text-center">
                <img class="mx-auto pt-8 mb-6" src="./assets/github-logo.png" alt="">
                <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>
                <p class="text-lg font-semibold pt-2">Sign in to manage your issues</p>

            </div>
            <div class="mx-auto">
                <fieldset class="fieldset border-base-200 mt-4 rounded-box w-xs border p-4">

                    <label class="label">Username</label>
                    <input id="username" type="text" class="input" placeholder="Enter Username" />
                    <p class="text-[#4A00FF]">Default: admin</p>

                    <label class="label">Password</label>
                    <input id="password" type="password" class="input" placeholder="Enter Password" />
                    <p class="text-[#4A00FF] pb-3">Default: admin123</p>

                    <button onclick="signIn ()" class="btn btn-primary wide btn-xs sm:btn-sm md:btn-md mx-auto">Sign In</button>
                </fieldset>
            </div>

        </section>


    </main>




    <script src="./script/script.js"></script>
</body>

</html>
