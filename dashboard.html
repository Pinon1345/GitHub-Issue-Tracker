<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITHUB ISSUE TRACKER | Dashboard</title>

    <!-- CSS file linkage -->

    <link rel="stylesheet" href="./style/style.css">

    <!-- Tailwind CSS + DaisyUI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- Web Tab Icon -->

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>

<body>

    <main class=" w-100% mx-auto">

        <!-- Navigation Bar -->

        <section>

            <div class="navbar bg-base-100 shadow-sm mx-auto sm:gap-2 items-center">
                <div class="flex-1 pl-3">
                    <div class="navLeft flex justify-start gap-3 items-center md:col-span-1">
                        <img class="w-[40px]" src="./assets/github-logo.png" alt="">
                        <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>

                    </div>
                </div>
                <div class="flex pr-3">

                    <div class="join gap-1">
                        <div>
                            <label class="input validator join-item w-full max-w-lg mx-auto">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                    stroke="currentColor">
                                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                                </g>
                                <div class="">
                                    <i class="fa-brands fa-sistrix"></i>
                                    <input type="text" placeholder="Search issues..." required />
                                </div>
                            </label>
                            <div class="validator-hint hidden">Enter Valid Search Items</div>
                        </div>
                        <button class="btn btn-primary btn-xs sm:btn-sm md:btn-md"><i class="fa-solid fa-plus"></i> New
                            Issue</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Dashboard Page -->

        <!-- Tabs section -->

        <section class="w-11/12 space-y-5 mx-auto bg-[#f8fafc] p-3 mt-8 mb-3 rounded-[5px] shadow-sm">
            <div class="flex gap-3">
                    <button onclick="handleTab('all')" class="btn btn-primary">All</button>
                    <button onclick="handleTab('open')" class="btn btn-outline">Open</button>
                    <button onclick="handleTab('closed')" class="btn btn-outline">Closed</button>
                
            </div>
        </section>

        <!-- Cards section -->

        <section class="w-11/12 space-y-5 mx-auto shadow-lg mb-10">

            <!-- count display -->

            <div
                class="bg-[#f8fafc9a] p-5 mt-6 rounded-[5px] shadow-sm border-b-2 border-white flex justify-between items-center">

                <div class="left-count-div flex gap-3 items-center justify-between">
                    <img class="w-8 h-8" src="./assets/Aperture.png" alt="">
                    <div>
                        <h2 id="issueCount" class="font-bold text-xl">50 Issues</h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>


                </div>

                <div class="right-show-div flex justify-between gap-4 items-center">
                    <div class="flex justify-between gap-2 items-center">
                        <img src="./assets/Ellipse 2.png" alt="">
                        <p class="font-medium">Open</p>
                    </div>
                    <div class="flex justify-between gap-2 items-center">
                        <img src="./assets/Ellipse 3.png" alt="">
                        <p class="font-medium">Closed</p>
                    </div>

                </div>


            </div>


            <!-- cards section -->

            <div class="bg-[#f8fafc9f] p-5 mt-5 rounded-[5px] mb-10">

                <!-- Issues container -->

                <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-4 gap-6 mb-5">

                    <!-- Card style -->

    <script src="./script/script.js"></script>
</body>
